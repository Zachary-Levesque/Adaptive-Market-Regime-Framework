data:
  universe:
    - NVDA
    - TSM
    - AMD
    - CIEN
    - LITE
    - AAPL
    - MSFT
    - GOOGL
    - META
    - AMZN
    - JPM
    - GS
    - SPY
    - QQQ
    - TLT
    - GLD
    - HYG
    - LQD
    - ^VIX
  start_date: "2000-01-01"
  end_date: "2024-12-31"
  benchmark: "SPY"
  cache_dir: "data/raw"
  processed_dir: "data/processed"
  local_data_dir: "data/raw"

regime:
  n_regimes: 4
  n_iter: 1000
  covariance_type: "full"
  regime_names:
    0: "Bull Trending"
    1: "Low-Vol Compression"
    2: "Bear Trending"
    3: "High-Vol Crisis"

alpha:
  lstm:
    hidden_size: 128
    num_layers: 2
    dropout: 0.2
    sequence_length: 60
    batch_size: 32
    epochs: 100
    learning_rate: 0.001
  walk_forward:
    train_window: 756
    test_window: 126
    step_size: 63

rl:
  total_timesteps: 1000000
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  initial_capital: 100000

risk:
  n_simulations: 10000
  confidence_level: 0.95
  stress_periods:
    gfc: ["2008-09-01", "2009-03-31"]
    covid: ["2020-02-19", "2020-03-23"]
    rate_hike: ["2022-01-03", "2022-12-31"]
